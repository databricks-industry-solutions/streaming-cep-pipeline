bundle:
  name: streaming-cep-pipeline

variables:
  project_name:
    description: "Project name used in deployment paths"
    default: "streaming-cep-pipeline"

  warehouse_id:
    lookup:
      warehouse: "Shared Unity Catalog Serverless"

  environment:
    description: "Deployment environment (dev, staging, prod)"
    default: "dev"

targets:
  dev:
    default: true
    mode: development

resources:
  # CEP Rules Editor — visual rule editor running on Databricks Apps.
  # Build the React frontend before deploying: `cd apps/rule-editor/frontend && npm install && npm run build`
  apps:
    cep_rules_editor:
      name: "cep-rules-editor"
      description: "Visual rule editor for the CEP pipeline (FastAPI + React + GoRules JDM Editor)"
      source_code_path: "/Users/${workspace.current_user.userName}/${var.project_name}-${var.environment}/files/apps/rule-editor"

  jobs:
    # Run the three CEP scenario pipelines concurrently. Each is a continuous
    # streaming job (foreachBatch with 1-minute trigger).
    cep_pipelines:
      name: "${var.project_name} - CEP scenarios"
      tasks:
        - task_key: s1_syslog
          notebook_task:
            notebook_path: "./notebooks/s1-syslog/pipeline.py"
        - task_key: s2_linkdown
          notebook_task:
            notebook_path: "./notebooks/s2-linkdown/pipeline.py"
        - task_key: s3_iptv
          notebook_task:
            notebook_path: "./notebooks/s3-iptv/pipeline.py"

# For more options and schema, see: https://docs.databricks.com/aws/en/dev-tools/bundles/settings
