bundle:
  name: streaming-cep-pipeline

# Force-include the frontend build output. It is .gitignore'd (so dev workflows
# don't commit build artifacts) but the FastAPI backend serves it from disk,
# so the bundle deploy must upload it.
sync:
  include:
    - apps/rule-editor/frontend/dist/**

variables:
  project_name:
    description: "Project name used in deployment paths"
    default: "streaming-cep-pipeline"

  catalog:
    description: "Unity Catalog name to write into"
    default: "cep_demo"

  schema:
    description: "Schema (database) inside the catalog"
    default: "network"

  warehouse_id:
    description: "Optional: SQL Warehouse for dashboards / ad-hoc queries"
    default: ""

  environment:
    description: "Deployment environment (dev, staging, prod)"
    default: "dev"

  node_type_id:
    description: "Streaming cluster node type. Override per cloud — AWS: i3.xlarge / m5d.xlarge; GCP: n2-standard-4; Azure: Standard_D4ds_v5"
    default: "i3.xlarge"

targets:
  dev:
    default: true
    mode: development

  prod:
    mode: production

resources:
  # ----------------------------------------------------------------------
  # Setup job — one-shot. Creates catalog/schema/volumes/result tables and
  # generates 30 days of synthetic data for all three scenarios.
  # ----------------------------------------------------------------------
  jobs:
    cep_setup:
      name: "${var.project_name} - Setup (one-shot)"
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: "./notebooks/00_setup.py"
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
        - task_key: gen_s1
          depends_on:
            - task_key: setup
          notebook_task:
            notebook_path: "./notebooks/s1-syslog/generate_input.py"
        - task_key: gen_s2
          depends_on:
            - task_key: setup
          notebook_task:
            notebook_path: "./notebooks/s2-linkdown/generate_inputs.py"
        - task_key: gen_s3
          depends_on:
            - task_key: setup
          notebook_task:
            notebook_path: "./notebooks/s3-iptv/generator.py"

    # ----------------------------------------------------------------------
    # Streaming job — runs forever. Each task is a continuous foreachBatch
    # pipeline. Cancel the run to stop the streams.
    #
    # Serverless does not support `processingTime` triggers
    # (INFINITE_STREAMING_TRIGGER_NOT_SUPPORTED), so this job uses a small
    # classic job cluster. zen-engine is installed via job libraries.
    # ----------------------------------------------------------------------
    cep_pipelines:
      name: "${var.project_name} - CEP scenarios (streaming)"
      job_clusters:
        - job_cluster_key: streaming_cluster
          new_cluster:
            spark_version: "17.3.x-scala2.13"
            node_type_id: "${var.node_type_id}"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
            custom_tags:
              ResourceClass: "SingleNode"
            data_security_mode: "SINGLE_USER"
      tasks:
        - task_key: s1_syslog
          job_cluster_key: streaming_cluster
          notebook_task:
            notebook_path: "./notebooks/s1-syslog/pipeline.py"
          libraries:
            - pypi: { package: "zen-engine" }
        - task_key: s2_linkdown
          job_cluster_key: streaming_cluster
          notebook_task:
            notebook_path: "./notebooks/s2-linkdown/pipeline.py"
          libraries:
            - pypi: { package: "zen-engine" }
        - task_key: s3_iptv
          job_cluster_key: streaming_cluster
          notebook_task:
            notebook_path: "./notebooks/s3-iptv/pipeline.py"
          libraries:
            - pypi: { package: "zen-engine" }
        # Continuous live data injector — feeds the 3 streaming pipelines with
        # fresh-timestamped rows so the time-windowed queries actually fire.
        # Disable this task in production (use real upstream data sources).
        - task_key: live_injector
          job_cluster_key: streaming_cluster
          notebook_task:
            notebook_path: "./notebooks/live_injector.py"

  # ----------------------------------------------------------------------
  # Lakeview dashboard for alarm visualization (opt-in).
  #
  # Uncomment the block below AND pass --var warehouse_id=<id> at deploy
  # time. Warehouse name conventions differ across workspaces (e.g.
  # "Shared Unity Catalog Serverless", "Serverless Starter Warehouse"),
  # so we don't lookup by name to keep the bundle portable.
  #
  #   databricks bundle deploy --var warehouse_id=$(databricks warehouses list -o json | jq -r '.[0].id')
  #
  # dashboards:
  #   cep_alarms:
  #     display_name: "${var.project_name} - CEP alarms"
  #     file_path: "./dashboards/cep_alarms.lvdash.json"
  #     warehouse_id: "${var.warehouse_id}"
  # ----------------------------------------------------------------------
  # Visual rule editor — Databricks App. Build the React frontend before
  # deploying:
  #     cd apps/rule-editor/frontend && npm install && npm run build
  # ----------------------------------------------------------------------
  apps:
    cep_rules_editor:
      name: "cep-rules-editor"
      description: "Visual rule editor for the CEP pipeline (FastAPI + React + GoRules JDM Editor)"
      source_code_path: "/Workspace/Users/${workspace.current_user.userName}/.bundle/${var.project_name}/${var.environment}/files/apps/rule-editor"

# For more options and schema, see: https://docs.databricks.com/aws/en/dev-tools/bundles/settings
